version: "3.8"

services:
  voice-cloning:
    build:
      context: ./voice cloning
      dockerfile: Dockerfile.voice
    container_name: voice-cloning-service
    ports:
      - "9871:9871"
      - "9872:9872"
      - "9873:9873"
      - "9874:9874"
      - "9880:9880"
    volumes:
      - ./voice cloning/GPT-SoVITS:/workspace/GPT-SoVITS
      - ./voice cloning/english accent/dataset:/workspace/dataset
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - is_half=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    tty: true
    stdin_open: true
    restart: unless-stopped
